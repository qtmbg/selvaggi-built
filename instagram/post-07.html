<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; overflow:hidden; }
  body {
    font-family:'Inter',-apple-system,sans-serif;
    background:#B77C4A; color:#F5F0E6;
    display:flex; flex-direction:column;
    padding:72px 84px;
    -webkit-font-smoothing:antialiased;
  }
  .top {
    display:flex; justify-content:space-between; align-items:center;
    padding-bottom:36px; border-bottom:2px solid rgba(245,240,230,0.35);
  }
  .wordmark { font-size:34px; font-weight:800; letter-spacing:0.14em; }
  .counter { font-size:32px; font-weight:500; color:rgba(245,240,230,0.85); letter-spacing:0.06em; }
  .main { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .eyebrow-row { display:flex; align-items:center; gap:24px; margin-bottom:40px; }
  .accent-bar { display:block; width:88px; height:10px; background:#101820; }
  .eyebrow { font-size:34px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#101820; }
  .bignum {
    font-size:200px; font-weight:800; line-height:1; color:transparent;
    -webkit-text-stroke:3px #101820; margin-bottom:24px;
  }
  .headline { font-size:108px; font-weight:800; line-height:1.06; letter-spacing:-0.02em; margin-bottom:44px; }
  .body { font-size:44px; font-weight:400; line-height:1.45; color:rgba(245,240,230,0.85); max-width:860px; }
  .kicker { font-size:36px; font-weight:700; color:#101820; margin-top:48px; }
  .list { list-style:none; margin-top:8px; }
  .list li {
    font-size:50px; font-weight:700; line-height:1; padding:26px 0;
    display:flex; align-items:center; gap:28px;
    border-bottom:2px solid rgba(245,240,230,0.35);
  }
  .list li:last-child { border-bottom:none; }
  .tick { display:block; width:22px; height:22px; background:#101820; flex-shrink:0; }
  .cta {
    display:inline-block; align-self:flex-start; margin-top:56px;
    background:#101820; color:#F5F0E6;
    font-size:42px; font-weight:800; letter-spacing:0.06em;
    padding:30px 48px;
  }
  .quotemark { font-size:220px; font-weight:800; line-height:0.6; color:#101820; margin-bottom:8px; }
  .quote-h { font-size:96px; }
  .attribution { font-size:38px; font-weight:500; color:rgba(245,240,230,0.85); }
  .bottom {
    display:flex; justify-content:space-between; align-items:center;
    padding-top:36px; border-top:2px solid rgba(245,240,230,0.35);
    font-size:28px; font-weight:500; color:rgba(245,240,230,0.85); letter-spacing:0.04em;
  }
</style></head>
<body>
  <div class="top">
    <div class="wordmark">SELVAGGI BUILT</div>
    <div class="counter">07 / 12</div>
  </div>
  <div class="main">
      <div class="quotemark">“</div>
      <h1 class="headline quote-h">The schedule serves the hospital. Not the build.</h1>
      <p class="attribution">— Selvaggi Built field standard</p></div>
  <div class="bottom">
    <span>Healthcare Construction · Anaheim, CA</span>
    <span>CSLB #1079406</span>
  </div>
</body></html>
